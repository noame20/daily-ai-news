  <style>
    
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FFF8F0; --surface: #FFFFFF; --primary: #FFB5C5; --primary-dark: #FF8FAB;
    --secondary: #E8D5F5; --accent: #A8E6CF; --accent-dark: #7DD3B0;
    --text: #4A4458; --text-light: #8E8A9E; --border: #F0E8E0;
    --shadow: rgba(255,181,197,0.2); --shadow-lg: rgba(255,181,197,0.35);
    --code-bg: #FFF0F5; --radius: 20px; --bar: var(--primary);
    --nav-height: 60px;
  }
  [data-theme="dark"] {
    --bg: #1A1625; --surface: #2D2640; --primary: #FFB5C5; --primary-dark: #FF8FAB;
    --secondary: #C9A8E8; --accent: #7DD3B0; --accent-dark: #6BC49A;
    --text: #F0EBF8; --text-light: #A8A0BC; --border: #3D3555;
    --shadow: rgba(0,0,0,0.4); --shadow-lg: rgba(0,0,0,0.5); --code-bg: #2D2640;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1A1625; --surface: #2D2640; --primary: #FFB5C5; --primary-dark: #FF8FAB;
      --secondary: #C9A8E8; --accent: #7DD3B0; --accent-dark: #6BC49A;
      --text: #F0EBF8; --text-light: #A8A0BC; --border: #3D3555;
      --shadow: rgba(0,0,0,0.4); --shadow-lg: rgba(0,0,0,0.5); --code-bg: #2D2640;
    }
  }
  body {
    font-family: 'Noto Sans SC','Quicksand',ui-sans-serif,system-ui,sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.8;
    min-height: 100vh;
    /* S-curve momentum scroll feel */
    scroll-behavior: auto;
  }
  html { scroll-behavior: auto; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto !important; }
  }
  a { color: var(--primary-dark); text-decoration: none; font-weight: 500; }
  a:hover { text-decoration: underline; }

  /* ── Top navbar ── */
  .navbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    height: var(--nav-height);
    background: rgba(255,248,240,0.85);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border-bottom: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px;
    transition: transform 320ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  [data-theme="dark"] .navbar { background: rgba(26,22,37,0.88); }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .navbar { background: rgba(26,22,37,0.88); }
  }
  .navbar.nav-hidden { transform: translateY(-100%); }
  .nav-logo {
    font-family:'Quicksand','Noto Sans SC',sans-serif;
    font-size:1.1rem; font-weight:700; color:var(--text);
    display:flex; align-items:center; gap:8px;
  }
  .nav-logo svg { color:var(--primary-dark); }
  .nav-links { display:flex; gap:4px; }
  .nav-link {
    display:inline-flex; align-items:center; gap:6px;
    padding:8px 16px; border-radius:100px; font-size:0.875rem; font-weight:600;
    color:var(--text-light); cursor:pointer; border:none;
    background:transparent; transition:all 200ms ease;
  }
  .nav-link:hover { color:var(--text); background:var(--surface); box-shadow:0 2px 8px var(--shadow); }
  .nav-link.active { color:var(--primary-dark); background:var(--surface); box-shadow:0 2px 12px var(--shadow); }
  .nav-right { display:flex; align-items:center; gap:8px; }
  /* Theme toggle in navbar */
  .nav-theme-toggle {
    width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
    background:var(--surface); border:1.5px solid var(--border);
    border-radius:10px; cursor:pointer; color:var(--text);
    box-shadow:0 2px 8px var(--shadow); transition:all 200ms ease;
  }
  .nav-theme-toggle:hover { box-shadow:0 4px 12px var(--shadow-lg); transform:scale(1.05); }

  /* ── Page content offset for fixed navbar ── */
  .page-body { padding-top: var(--nav-height); }

  /* ── Reading progress bar ── */
  #progress-bar {
    position: fixed; bottom: 0; left: 0; z-index: 600;
    width: 0%; height: 3px;
    background: linear-gradient(to right, var(--primary), var(--secondary));
    transition: width 60ms linear;
  }

  /* ── Floating buttons ── */
  .float-btns {
    position: fixed; bottom: 20px; right: 20px; z-index: 400;
    display: flex; flex-direction: column; gap: 8px;
  }
  .float-btn.is-fav { color: #FF6B8A; }
  .float-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; cursor: pointer; color: var(--text);
    box-shadow: 0 2px 8px var(--shadow); transition: box-shadow 200ms ease, transform 200ms ease;
    text-decoration: none;
  }
  .float-btn:hover { box-shadow: 0 4px 16px var(--shadow-lg); transform: scale(1.05); color: var(--primary-dark); }
  .float-btn:active { transform: scale(0.95); }

    .card { display:block; text-decoration:none; border-radius:var(--radius); animation:slideUp 0.4s ease-out both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

    .card-inner { background:var(--surface); border-radius:var(--radius); padding:20px; display:flex; align-items:center; gap:14px; box-shadow:0 2px 12px var(--shadow); border:2px solid var(--primary); transition:transform 200ms ease,box-shadow 200ms ease; }
    .card:hover .card-inner { transform:translateY(-4px) scale(1.01); box-shadow:0 8px 24px var(--shadow-lg); }
    .card:active .card-inner { transform:translateY(-2px) scale(0.99); }
    .card-icon { width:44px; height:44px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:rgba(255,107,138,0.1); border-radius:14px; color:#FF6B8A; }
    .info { flex:1; min-width:0; }
    .date { display:block; font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1rem; font-weight:600; color:var(--text); }
    .label { display:block; font-size:0.78rem; color:var(--text-light); margin-top:2px; font-weight:500; }
    .card-fav-icon { color:#FF6B8A; flex-shrink:0; }

    .card:hover .arrow { transform:translateX(4px); }
    .empty-state { text-align:center; padding:80px 20px; animation:slideUp 0.4s ease-out both; }
    .empty-icon { margin-bottom:20px; display:flex; justify-content:center; opacity:0.4; }

    .empty-title { font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text); margin-bottom:8px; }

    footer { text-align:center; margin-top:56px; padding-top:24px; font-size:0.8rem; color:var(--text-light); }
    footer::before { content:''; display:block; width:60px; height:2px; background:linear-gradient(to right,transparent,var(--secondary),transparent); margin:0 auto 24px; border-radius:2px; }
  </style>

// Native browser smooth scroll — browser handles physics & compositing
function smoothScrollTo(target) {
  if (typeof target === 'number') {
    window.scrollTo({ top: target, behavior: 'smooth' });
  } else if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Navbar hide/show on scroll (up = show, down = hide)
// Uses native scroll, no rAF loop fighting the browser
(function() {
  var navbar = document.getElementById('navbar');
  if (!navbar) return;
  var lastScrollY = 0;
  var rafPending = false;

  function updateNavbar() {
    var scrollY = window.pageYOffset || document.documentElement.scrollTop;
    if (scrollY <= 10) {
      navbar.classList.remove('nav-hidden');
      rafPending = false;
      return;
    }
    if (scrollY > lastScrollY && scrollY > 80) {
      navbar.classList.add('nav-hidden');
    } else {
      navbar.classList.remove('nav-hidden');
    }
    lastScrollY = scrollY;
    rafPending = false;
  }

  window.addEventListener('scroll', function() {
    if (!rafPending) {
      rafPending = true;
      requestAnimationFrame(updateNavbar);
    }
  }, { passive: true });
})();


    var FAV_KEY = 'ainews_favs';

    if (storedTheme === 'dark') { html.setAttribute('data-theme','dark'); btn.innerHTML = moonI; }
    else if (storedTheme === 'light') { html.setAttribute('data-theme','light'); btn.innerHTML = sunI; }

      document.getElementById('progress-bar').style.width = (total > 0 ? (scrolled / total * 100) : 0) + '%';
    }, { passive: true });

    function makeCard(entry) {
      return '<a href="./' + entry.date + '.html" class="card" data-from-favs="1">' +
        '<div class="card-inner">' +
        '<div class="card-icon"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>' +
        '<div class="info"><span class="date">' + entry.displayDate + '</span><span class="label">AI 日报</span></div>' +
        '<div class="card-fav-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor"/></svg></div>' +
        '<div class="arrow"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>' +
        '</div></a>';
    }

    // Use event delegation — mark entering from favorites via localStorage flag
    // localStorage is more reliable than sessionStorage for cross-page state
    var FAVS_ENTRY_KEY = 'ainews_enter_from_favs';
    document.addEventListener('click', function(e) {
      var card = e.target.closest('[data-from-favs]');
      if (card) {
        localStorage.setItem(FAVS_ENTRY_KEY, '1');
      }
    });

    function render() {
      var favDates = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
      var grid = document.getElementById('favsGrid');
      var empty = document.getElementById('emptyState');
      var countEl = document.getElementById('favCount');
      if (favDates.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        countEl.textContent = '共 0 篇日报';
      } else {
        grid.style.display = 'grid';
        empty.style.display = 'none';
        countEl.textContent = '共 ' + favDates.length + ' 篇日报';
        var favEntries = ALL_ENTRIES.filter(function(e) { return favDates.indexOf(e.date) !== -1; });
        grid.innerHTML = favEntries.map(function(e) { return makeCard(e); }).join('');
      }
    }

    render();
  </script>
