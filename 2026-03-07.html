  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {

    body { font-family: 'Noto Sans SC','Quicksand',ui-sans-serif,system-ui,sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; min-height: 100vh; }
    body::before { content:''; position:fixed; top:0; left:0; right:0; height:360px; background: linear-gradient(180deg,rgba(255,181,197,0.18) 0%,transparent 100%); pointer-events:none; z-index:0; }
    .container { position:relative; z-index:1; max-width:760px; margin:0 auto; padding:0 16px 80px; }
    nav { padding:28px 0 32px; }
    nav a { display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--text-light); font-size:0.875rem; font-weight:600; padding:8px 16px; background:var(--surface); border-radius:100px; box-shadow:0 2px 8px var(--shadow); border:1.5px solid var(--border); transition:all 200ms ease; }
    nav a:hover { color:var(--primary-dark); border-color:var(--primary); box-shadow:0 4px 16px var(--shadow-lg); transform:translateX(-2px); }
    nav a svg { width:16px; height:16px; }
    article { background:var(--surface); border-radius:var(--radius); padding:40px 36px; box-shadow:0 4px 24px var(--shadow); border:1.5px solid var(--border); animation:slideUp 0.4s ease-out both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
    @media (prefers-reduced-motion: reduce) { article { animation:none; } }
    .article-meta { display:flex; align-items:center; gap:12px; margin-bottom:32px; padding-bottom:24px; border-bottom:2px solid var(--border); }
    .article-date-badge { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%); color:#fff; font-family:'Quicksand',sans-serif; font-size:0.875rem; font-weight:700; padding:6px 14px; border-radius:100px; }
    .content h1 { font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1.6rem; font-weight:700; color:var(--text); margin:28px 0 16px; letter-spacing:-0.01em; }
    .content h2 { font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text); margin:32px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--border); }
    .content h3 { font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1.05rem; font-weight:600; color:var(--primary-dark); margin:24px 0 8px; }
    .content h4 { font-size:0.9rem; font-weight:600; color:var(--text-light); text-transform:uppercase; letter-spacing:0.06em; margin:20px 0 6px; }
    .content p { margin:0 0 16px; font-size:1rem; line-height:1.85; }
    .content ul, .content ol { margin:0 0 16px; padding-left:24px; }
    .content li { margin:6px 0; line-height:1.7; }
    .content a { color:var(--primary-dark); text-decoration:none; font-weight:500; }
    .content a:hover { text-decoration:underline; }
    .content code { font-family:'Fira Code','Consolas',monospace; font-size:0.875em; background:var(--code-bg); color:var(--primary-dark); padding:2px 8px; border-radius:6px; font-weight:500; }
    .content pre { background:var(--code-bg) !important; border-radius:14px; padding:20px !important; overflow-x:auto; margin:20px 0 !important; border:1.5px solid var(--border); }
    .content pre code { background:transparent !important; color:inherit; padding:0; font-size:0.875rem; line-height:1.65; }
    .content blockquote { margin:20px 0; padding:14px 20px; background:linear-gradient(135deg,rgba(255,181,197,0.12) 0%,rgba(232,213,245,0.12) 100%); border-left:4px solid var(--primary); border-radius:0 12px 12px 0; }
    .content blockquote p { margin:0; }
    .content table { width:100%; border-collapse:collapse; margin:20px 0; font-size:0.9375rem; border-radius:12px; overflow:hidden; border:1.5px solid var(--border); }
    .content th, .content td { padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
    .content th { background:var(--code-bg); font-weight:600; font-size:0.875rem; }
    .content tr:last-child td { border-bottom:none; }
    .content tr:nth-child(even) td { background:rgba(255,181,197,0.05); }
    .content img { max-width:100%; height:auto; border-radius:12px; margin:8px 0; }
    .content hr { border:none; border-top:2px solid var(--border); margin:32px 0; }
    .content strong { font-weight:600; }
    @media (max-width:600px) { article{padding:24px 20px;} .content h1{font-size:1.35rem;} .content h2{font-size:1.1rem;} }
  </style>
