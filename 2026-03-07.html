  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

// Native browser smooth scroll — browser handles physics & compositing
function smoothScrollTo(target) {
  if (typeof target === 'number') {
    window.scrollTo({ top: target, behavior: 'smooth' });
  } else if (target) {
    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// Navbar hide/show on scroll (up = show, down = hide)
// Uses native scroll, no rAF loop fighting the browser
(function() {
  var navbar = document.getElementById('navbar');
  if (!navbar) return;
  var lastScrollY = 0;
  var rafPending = false;

  function updateNavbar() {
    var scrollY = window.pageYOffset || document.documentElement.scrollTop;
    if (scrollY <= 10) {
      navbar.classList.remove('nav-hidden');
      rafPending = false;
      return;
    }
    if (scrollY > lastScrollY && scrollY > 80) {
      navbar.classList.add('nav-hidden');
    } else {
      navbar.classList.remove('nav-hidden');
    }
    lastScrollY = scrollY;
    rafPending = false;
  }

  window.addEventListener('scroll', function() {
    if (!rafPending) {
      rafPending = true;
      requestAnimationFrame(updateNavbar);
    }
  }, { passive: true });
})();

          rightNav.style.top    = top + 'px';
          rightNav.style.right = (vw - rect.right) + 'px';
        }
      }
      positionEdgeNavs();
      window.addEventListener('resize', positionEdgeNavs);

    });

    // Back to top — uses native browser smooth scroll
    document.getElementById('backToTop').addEventListener('click', function() {
      smoothScrollTo(0);
    });

    // ── Favorites-aware prev/next navigation ──
    // prevDate/nextDate come from the HTML as chronological neighbors;
    // if the current page is in favorites, override to navigate within favorites list.
    var FAV_KEY = 'ainews_favs';
    var favDates = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
    var curIdx = favDates.indexOf(CURRENT_DATE);
    var prevLink = document.getElementById('favPrevLink');
    var prevLabel = document.getElementById('favPrevLabel');
    var nextLink = document.getElementById('favNextLink');
    var nextLabel = document.getElementById('favNextLabel');

    if (curIdx !== -1 && favDates.length > 0) {
      // Override with favorites-only navigation
      if (curIdx < favDates.length - 1) {
        var prevD = favDates[curIdx + 1];
        prevLink.href = './' + prevD + '.html';
        prevLabel.textContent = prevD;
      } else {
        prevLink.href = '#';
        prevLink.className = 'nav-btn nav-btn--disabled';
        prevLabel.textContent = '没有更早的';
      }
      if (curIdx > 0) {
        var nextD = favDates[curIdx - 1];
        nextLink.href = './' + nextD + '.html';
        nextLabel.textContent = nextD;
      } else {
        nextLink.href = '#';
        nextLink.className = 'nav-btn nav-btn--disabled';
        nextLabel.textContent = '没有更新的';
      }
    }
    // else: keep chronological href/label from HTML — already set at generate time

    // ── Favorites toggle ──
    var favBtn = document.getElementById('favBtn');
    function updateFavBtn() {
      var cur = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
      var isFav = cur.indexOf(CURRENT_DATE) !== -1;
      favBtn.innerHTML = isFav ? '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="currentColor"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>';
      favBtn.classList.toggle('is-fav', isFav);
    }
    updateFavBtn();
    favBtn.addEventListener('click', function() {
      var cur = JSON.parse(localStorage.getItem(FAV_KEY) || '[]');
      var idx = cur.indexOf(CURRENT_DATE);
      if (idx === -1) {
        cur.push(CURRENT_DATE); // add
      } else {
        cur.splice(idx, 1); // remove
      }
      localStorage.setItem(FAV_KEY, JSON.stringify(cur));
      updateFavBtn();
    });

    // Progress bar
    window.addEventListener('scroll', function() {
      var scrolled = document.documentElement.scrollTop;
      var total = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      document.getElementById('progress-bar').style.width = (total > 0 ? (scrolled / total * 100) : 0) + '%';
    }, { passive: true });

    // Markdown highlight
    document.addEventListener('DOMContentLoaded', function() {
      marked.setOptions({ gfm:true, breaks:true, highlight:function(code,lang){
        if(lang && hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value;
        return hljs.highlightAuto(code).value;
      }});
      document.querySelectorAll('.content pre code').forEach(function(b){ hljs.highlightElement(b); });
    });
  </script>
</body>
</html>
