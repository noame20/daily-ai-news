  <style>
    
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #FFF8F0; --surface: #FFFFFF; --primary: #FFB5C5; --primary-dark: #FF8FAB;
    --secondary: #E8D5F5; --accent: #A8E6CF; --accent-dark: #7DD3B0;
    --text: #4A4458; --text-light: #8E8A9E; --border: #F0E8E0;
    --shadow: rgba(255,181,197,0.2); --shadow-lg: rgba(255,181,197,0.35);
    --code-bg: #FFF0F5; --radius: 20px; --bar: var(--primary);
  }
  [data-theme="dark"] {
    --bg: #1A1625; --surface: #2D2640; --primary: #FFB5C5; --primary-dark: #FF8FAB;
    --secondary: #C9A8E8; --accent: #7DD3B0; --accent-dark: #6BC49A;
    --text: #F0EBF8; --text-light: #A8A0BC; --border: #3D3555;
    --shadow: rgba(0,0,0,0.4); --shadow-lg: rgba(0,0,0,0.5); --code-bg: #2D2640;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #1A1625; --surface: #2D2640; --primary: #FFB5C5; --primary-dark: #FF8FAB;
      --secondary: #C9A8E8; --accent: #7DD3B0; --accent-dark: #6BC49A;
      --text: #F0EBF8; --text-light: #A8A0BC; --border: #3D3555;
      --shadow: rgba(0,0,0,0.4); --shadow-lg: rgba(0,0,0,0.5); --code-bg: #2D2640;
    }
  }
  body { font-family: 'Noto Sans SC','Quicksand',ui-sans-serif,system-ui,sans-serif; background: var(--bg); color: var(--text); line-height: 1.8; min-height: 100vh; }
  a { color: var(--primary-dark); text-decoration: none; font-weight: 500; }
  a:hover { text-decoration: underline; }

  /* ── Theme toggle ── */
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 200;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; cursor: pointer; color: var(--text);
    box-shadow: 0 2px 8px var(--shadow); transition: all 200ms ease;
  }
  .theme-toggle:hover { box-shadow: 0 4px 16px var(--shadow-lg); transform: scale(1.05); }

  /* ── Reading progress bar ── */
  #progress-bar {
    position: fixed; bottom: 0; left: 0; z-index: 300;
    width: 0%; height: 3px;
    background: linear-gradient(to right, var(--primary), var(--secondary));
    transition: width 80ms linear;
  }

  /* ── Floating buttons ── */
  .float-btns {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
  }
  .float-btn {
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 12px; cursor: pointer; color: var(--text);
    box-shadow: 0 2px 8px var(--shadow); transition: all 200ms ease;
    text-decoration: none;
  }
  .float-btn:hover { box-shadow: 0 4px 16px var(--shadow-lg); transform: scale(1.05); color: var(--primary-dark); }

    body::before { content:''; position:fixed; top:0; left:0; right:0; height:360px; background:linear-gradient(180deg,rgba(255,181,197,0.18) 0%,transparent 100%); pointer-events:none; z-index:0; }
    .container { position:relative; z-index:1; max-width:760px; margin:0 auto; padding:0 16px 80px; }
    nav { padding:28px 0 32px; display:flex; align-items:center; gap:10px; }
    nav a { display:inline-flex; align-items:center; gap:6px; text-decoration:none; color:var(--text-light); font-size:0.875rem; font-weight:600; padding:8px 16px; background:var(--surface); border-radius:100px; box-shadow:0 2px 8px var(--shadow); border:1.5px solid var(--border); transition:all 200ms ease; }
    nav a:hover { color:var(--primary-dark); border-color:var(--primary); box-shadow:0 4px 16px var(--shadow-lg); transform:translateX(-2px); }
    .article-meta { display:flex; align-items:center; gap:12px; margin-bottom:32px; padding-bottom:24px; border-bottom:2px solid var(--border); flex-wrap:wrap; }
    .article-date-badge { display:inline-flex; align-items:center; gap:6px; background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%); color:#fff; font-family:'Quicksand',sans-serif; font-size:0.875rem; font-weight:700; padding:6px 14px; border-radius:100px; }
    article { background:var(--surface); border-radius:var(--radius); padding:40px 36px; box-shadow:0 4px 24px var(--shadow); border:1.5px solid var(--border); animation:slideUp 0.4s ease-out both; }
    @keyframes slideUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @media(prefers-reduced-motion:reduce){article{animation:none}}
    .content h1 { font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1.6rem; font-weight:700; color:var(--text); margin:28px 0 16px; letter-spacing:-0.01em; }
    .content h2 { font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1.2rem; font-weight:700; color:var(--text); margin:32px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--border); }
    .content h3 { font-family:'Quicksand','Noto Sans SC',sans-serif; font-size:1.05rem; font-weight:600; color:var(--primary-dark); margin:24px 0 8px; }
    .content h4 { font-size:0.9rem; font-weight:600; color:var(--text-light); text-transform:uppercase; letter-spacing:0.06em; margin:20px 0 6px; }
    .content p { margin:0 0 16px; font-size:1rem; line-height:1.85; }
    .content ul,.content ol { margin:0 0 16px; padding-left:24px; }
    .content li { margin:6px 0; line-height:1.7; }
    .content code { font-family:'Fira Code','Consolas',monospace; font-size:0.875em; background:var(--code-bg); color:var(--primary-dark); padding:2px 8px; border-radius:6px; font-weight:500; }
    .content pre { background:var(--code-bg) !important; border-radius:14px; padding:20px !important; overflow-x:auto; margin:20px 0 !important; border:1.5px solid var(--border); }
    .content pre code { background:transparent !important; color:inherit; padding:0; font-size:0.875rem; line-height:1.65; }
    .content blockquote { margin:20px 0; padding:14px 20px; background:linear-gradient(135deg,rgba(255,181,197,0.12) 0%,rgba(232,213,245,0.12) 100%); border-left:4px solid var(--primary); border-radius:0 12px 12px 0; }
    .content blockquote p { margin:0; }
    .content table { width:100%; border-collapse:collapse; margin:20px 0; font-size:0.9375rem; border-radius:12px; overflow:hidden; border:1.5px solid var(--border); }
    .content th,.content td { padding:10px 14px; text-align:left; border-bottom:1px solid var(--border); }
    .content th { background:var(--code-bg); font-weight:600; font-size:0.875rem; }
    .content tr:last-child td { border-bottom:none; }
    .content tr:nth-child(even) td { background:rgba(255,181,197,0.05); }
    .content img { max-width:100%; height:auto; border-radius:12px; margin:8px 0; }
    .content hr { border:none; border-top:2px solid var(--border); margin:32px 0; }
    .content strong { font-weight:600; }
    @media(max-width:600px){article{padding:24px 20px}.content h1{font-size:1.35rem}.content h2{font-size:1.1rem}}

    /* ── Prev/Next navigation ── */
    .article-nav { display:flex; justify-content:space-between; align-items:center; margin-top:32px; padding-top:24px; border-top:2px solid var(--border); gap:12px; }
    .nav-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; background:var(--surface); border:1.5px solid var(--border); border-radius:100px; text-decoration:none; color:var(--text); font-size:0.875rem; font-weight:600; box-shadow:0 2px 8px var(--shadow); transition:all 200ms ease; }
    .nav-btn:hover:not(.nav-btn--disabled) { color:var(--primary-dark); border-color:var(--primary); box-shadow:0 4px 16px var(--shadow-lg); transform:scale(1.02); }
    .nav-btn--disabled { opacity:0.4; cursor:default; pointer-events:none; }
    .nav-btn span { max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  </style>
</head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script>
    // Theme toggle
    const btn = document.getElementById('themeToggle');
    const html = document.documentElement;
    const stored = localStorage.getItem('theme');
    if (stored === 'dark') { html.setAttribute('data-theme','dark'); btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>'; }
    else if (stored === 'light') { html.setAttribute('data-theme','light'); btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>'; }
    btn.addEventListener('click', () => {
      const cur = html.getAttribute('data-theme');
      if (cur === 'dark') { html.removeAttribute('data-theme'); localStorage.setItem('theme','light'); btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>'; }
      else { html.setAttribute('data-theme','dark'); localStorage.setItem('theme','dark'); btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>'; }
    });
    // Back to top
    document.getElementById('backToTop').addEventListener('click', () => window.scrollTo({ top:0, behavior:'smooth' }));
    // Progress bar
    window.addEventListener('scroll', () => {
      const scrolled = document.documentElement.scrollTop;
      const total = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      document.getElementById('progress-bar').style.width = (total > 0 ? (scrolled / total * 100) : 0) + '%';
    }, { passive: true });
    // Markdown highlight
    document.addEventListener('DOMContentLoaded', function() {
      marked.setOptions({ gfm:true, breaks:true, highlight:function(code,lang){
        if(lang && hljs.getLanguage(lang)) return hljs.highlight(code,{language:lang}).value;
        return hljs.highlightAuto(code).value;
      }});
      document.querySelectorAll('.content pre code').forEach(function(b){ hljs.highlightElement(b); });
    });
  </script>
